services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: scrapper
      POSTGRES_USER: scrapper
      POSTGRES_PASSWORD: scrapper
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI — ver emails en http://localhost:8025
      - "1025:1025"   # SMTP interno

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: npx prisma migrate deploy
    env_file: .env
    depends_on:
      - postgres
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      mongo:
        condition: service_started
      redis:
        condition: service_started
      mailpit:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      mongo:
        condition: service_started
      redis:
        condition: service_started
      mailpit:
        condition: service_started

volumes:
  postgres_data:
  mongo_data:
  redis_data:
