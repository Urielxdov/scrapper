services:
  postgres:
    image: postgres:16
    container_name: db
    restart: always
    environment:
      - POSTGRES_USER=value
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=scrapping
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=123456
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: